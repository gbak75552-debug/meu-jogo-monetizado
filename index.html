<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dating App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
    }header {
  background: #e11d48;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

.container {
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  background: #1e293b;
  border-radius: 15px;
  width: 300px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.name {
  font-size: 20px;
  margin: 10px 0;
}

.buttons {
  margin-top: 10px;
  display: flex;
  justify-content: space-around;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

.like {
  background: #22c55e;
  color: white;
}

.dislike {
  background: #ef4444;
  color: white;
}

footer {
  margin-top: 20px;
  text-align: center;
  font-size: 14px;
  opacity: 0.6;
}

  </style>
</head>
<body><header>🔥 Dating App</header><div class="container">
  <div class="card" id="card">
    <img id="photo" src="https://randomuser.me/api/portraits/women/44.jpg">
    <div class="name" id="name">Ana, 22</div><div class="buttons">
  <button class="dislike" onclick="nextProfile()">❌</button>
  <button class="like" onclick="like()">❤️</button>
</div>

  </div>
</div><footer>
  © 2026 Dating App - Todos os direitos reservados
</footer><!-- ExoClick Banner --><script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script><ins class="eas6a97888e2" data-zoneid="5915006"></ins>

<script>(AdProvider = window.AdProvider || []).push({"serve": {}});</script><script>
  const profiles = [
    {name: "Ana, 22", photo: "https://randomuser.me/api/portraits/women/44.jpg"},
    {name: "Julia, 25", photo: "https://randomuser.me/api/portraits/women/65.jpg"},
    {name: "Carla, 21", photo: "https://randomuser.me/api/portraits/women/12.jpg"},
    {name: "Marcos, 27", photo: "https://randomuser.me/api/portraits/men/32.jpg"},
    {name: "Pedro, 30", photo: "https://randomuser.me/api/portraits/men/45.jpg"}
  ];

  let index = 0;

  function nextProfile() {
    index = (index + 1) % profiles.length;
    document.getElementById("name").innerText = profiles[index].name;
    document.getElementById("photo").src = profiles[index].photo;
  }

  function like() {
    alert("Você curtiu esse perfil ❤️");
    nextProfile();
  }
</script></body>
</html>
